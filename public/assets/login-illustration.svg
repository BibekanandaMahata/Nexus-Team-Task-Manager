<svg width="450" height="320" viewBox="0 0 450 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="grad-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="grad-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="grad-people-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="grad-people-2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="grad-people-3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.1" />
    </linearGradient>

    <!-- Glass card gradient -->
    <linearGradient id="glass-card-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>

    <!-- Soft radial background light -->
    <radialGradient id="back-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background Ambient Glow -->
  <circle cx="225" cy="160" r="130" fill="url(#back-glow)" filter="url(#neon-glow)" />

  <!-- Grid/Horizon Line (Stylized Desk/Floor) -->
  <path d="M 50 260 L 400 260" stroke="#1e293b" stroke-width="2" stroke-linecap="round" />
  <path d="M 70 272 L 380 272" stroke="#1e293b" stroke-width="1" stroke-linecap="round" opacity="0.5" />

  <!-- Connections / Dash Paths (Collaboration waves) -->
  <path d="M 120 170 C 180 110, 270 110, 330 170" stroke="url(#grad-blue)" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.4" />
  <path d="M 225 150 L 225 240" stroke="#1e293b" stroke-width="1" stroke-dasharray="2 4" />

  <!-- Floating Kanban Card (Interactive Focus) -->
  <g transform="translate(175, 75)" filter="url(#neon-glow)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="url(#glass-card-bg)" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5" />
    <!-- Mini progress bar -->
    <rect x="12" y="14" width="35" height="6" rx="3" fill="#3b82f6" fill-opacity="0.8" />
    <rect x="12" y="28" width="76" height="4" rx="2" fill="#334155" />
    <rect x="12" y="28" width="52" height="4" rx="2" fill="url(#grad-cyan)" />
    <!-- Check icon -->
    <circle cx="80" cy="17" r="5" fill="#06b6d4" fill-opacity="0.2" />
    <path d="M 78 17 L 79.5 18.5 L 82 15.5" stroke="#06b6d4" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Secondary Floating Elements -->
  <!-- Small Card Left -->
  <g transform="translate(85, 100)" opacity="0.7">
    <rect x="0" y="0" width="60" height="35" rx="6" fill="url(#glass-card-bg)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
    <rect x="8" y="10" width="20" height="4" rx="2" fill="#64748b" />
    <rect x="8" y="20" width="44" height="3" rx="1.5" fill="#334155" />
  </g>

  <!-- Small Card Right -->
  <g transform="translate(305, 95)" opacity="0.7">
    <rect x="0" y="0" width="65" height="40" rx="6" fill="url(#glass-card-bg)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
    <rect x="8" y="10" width="25" height="4" rx="2" fill="#06b6d4" fill-opacity="0.4" />
    <circle cx="50" cy="12" r="4" fill="#3b82f6" />
    <rect x="8" y="22" width="49" height="3" rx="1.5" fill="#334155" />
  </g>

  <!-- TEAM MEMBERS -->
  
  <!-- Left Member (Designer/Ideator) -->
  <g transform="translate(80, 160)">
    <!-- Shadow/Glow base -->
    <ellipse cx="30" cy="95" rx="25" ry="5" fill="#020617" opacity="0.5" />
    <!-- Body -->
    <path d="M 12 90 C 12 60, 48 60, 48 90 Z" fill="url(#grad-people-1)" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1" />
    <!-- Head -->
    <circle cx="30" cy="45" r="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" />
    <!-- Arm (pointing up/right) -->
    <path d="M 42 70 C 55 65, 68 55, 75 42" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" />
    <circle cx="75" cy="42" r="3" fill="#3b82f6" />
  </g>

  <!-- Center Member (Developer - Sitting with Laptop) -->
  <g transform="translate(195, 170)">
    <!-- Shadow/Glow base -->
    <ellipse cx="30" cy="85" rx="30" ry="6" fill="#020617" opacity="0.6" />
    <!-- Body -->
    <path d="M 10 80 C 10 50, 50 50, 50 80 Z" fill="url(#grad-people-2)" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1" />
    <!-- Head -->
    <circle cx="30" cy="35" r="12" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5" />
    <!-- Hands / Laptop -->
    <path d="M 15 80 L 45 80 L 52 70" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Stylized Laptop Screen -->
    <path d="M 45 80 L 58 64 L 54 62" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" />
    <!-- Screen light rays -->
    <path d="M 58 64 L 68 62 M 56 60 L 64 54" stroke="#06b6d4" stroke-width="1" opacity="0.6" stroke-linecap="round" />
  </g>

  <!-- Right Member (Reviewer/Manager) -->
  <g transform="translate(305, 160)">
    <!-- Shadow/Glow base -->
    <ellipse cx="30" cy="95" rx="25" ry="5" fill="#020617" opacity="0.5" />
    <!-- Body -->
    <path d="M 12 90 C 12 60, 48 60, 48 90 Z" fill="url(#grad-people-3)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1" />
    <!-- Head -->
    <circle cx="30" cy="45" r="12" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" />
    <!-- Arm (reaching to drag card) -->
    <path d="M 18 70 C 5 62, -10 52, -18 45" stroke="#6366f1" stroke-width="2" stroke-linecap="round" />
    <circle cx="-18" cy="45" r="3" fill="#6366f1" />
  </g>

  <!-- Extra Details -->
  <!-- Checkmark icon badge top left -->
  <g transform="translate(70, 70)" filter="url(#neon-glow)">
    <circle cx="10" cy="10" r="10" fill="#22c55e" fill-opacity="0.2" />
    <circle cx="10" cy="10" r="8" fill="#10b981" />
    <path d="M 7 10 L 9 12 L 13 8" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Spark/Stars/Dots -->
  <path d="M 370 70 L 375 75 M 375 70 L 370 75" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" />
  <circle cx="150" cy="220" r="2" fill="#3b82f6" opacity="0.5" />
  <circle cx="280" cy="230" r="2.5" fill="#06b6d4" opacity="0.5" />
</svg>
